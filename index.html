<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Scanner</title>
<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    background: #0a0b0f;
    color: #e8eaed;
    min-height: 100dvh;
    overflow-x: hidden;
    transition: background 0.3s ease;
  }
  body.result-ok { background: #0f4024; }
  body.result-bad { background: #401010; }

  .view { display: none; }
  .view.active { display: block; }

  /* ---------- LOGIN ---------- */
  #view-login {
    padding: 2rem max(1rem, env(safe-area-inset-right)) calc(1rem + env(safe-area-inset-bottom)) max(1rem, env(safe-area-inset-left));
  }
  .login-wrap {
    max-width: 360px;
    margin: 10vh auto 0;
  }
  #view-login h1 {
    text-align: center;
    margin-bottom: 1.5rem;
  }
  #view-login input {
    width: 100%;
    padding: 0.85rem 1rem;
    font-size: 1rem;
    margin-bottom: 0.75rem;
    background: #14171e;
    border: 1px solid #23272f;
    border-radius: 10px;
    color: #e8eaed;
    font-family: inherit;
  }
  #view-login input:focus {
    outline: none;
    border-color: #3b82f6;
  }
  #btn-login {
    width: 100%;
    padding: 0.95rem;
    font-size: 1rem;
    font-weight: 700;
    letter-spacing: 0.06em;
    border: none;
    border-radius: 10px;
    background: linear-gradient(180deg, #3b82f6, #2563eb);
    color: white;
    cursor: pointer;
    margin-top: 0.25rem;
  }
  #btn-login:disabled {
    opacity: 0.6;
    cursor: not-allowed;
  }
  #login-error {
    margin-top: 0.75rem;
    padding: 0.6rem 0.85rem;
    border-radius: 8px;
    background: #2a0d0d;
    border: 1px solid #5c1818;
    color: #ff8a8a;
    font-size: 0.85rem;
    min-height: 1rem;
  }
  #login-error:empty { display: none; }

  /* ---------- HUB ---------- */
  #view-hub {
    padding: 1.5rem max(1rem, env(safe-area-inset-right)) calc(1.5rem + env(safe-area-inset-bottom)) max(1rem, env(safe-area-inset-left));
  }
  .hub-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 1rem;
  }
  .hub-header h1 { margin: 0; }
  #user-email {
    font-size: 0.75rem;
    color: #8a8f98;
    margin-right: 0.5rem;
  }
  #btn-signout {
    padding: 0.4rem 0.75rem;
    background: #1a1e27;
    border: 1px solid #2a2f3a;
    color: #c2c6cd;
    border-radius: 8px;
    font-size: 0.8rem;
    cursor: pointer;
  }
  #btn-signout:active { background: #262b36; }
  .wrap { max-width: 520px; margin: 0 auto; }
  h1 {
    margin: 0.25rem 0 1.25rem;
    font-size: 1.4rem;
    font-weight: 600;
    letter-spacing: -0.01em;
  }

  #status {
    padding: 0.6rem 0.85rem;
    border-radius: 8px;
    margin-bottom: 1rem;
    font-size: 0.85rem;
    background: #15181f;
    border: 1px solid #23272f;
  }
  #status:empty { display: none; }
  #status.warn { background: #2b2109; border-color: #5c4510; color: #f4cb6a; }
  #status.ok { background: #0c2016; border-color: #1a5f3c; color: #7cd9a0; }
  #status a { color: inherit; text-decoration: underline; }

  #result {
    padding: 1.75rem 1.25rem;
    border-radius: 14px;
    text-align: center;
    transition: background 0.2s, border-color 0.2s;
    background: #14171e;
    border: 2px solid #1e222b;
    margin-bottom: 1.25rem;
  }
  #result.empty { color: #5b616b; font-style: italic; }
  #result.ok {
    background: #0d2a1a;
    border-color: #1f9d5f;
    box-shadow: 0 0 0 3px rgba(31, 157, 95, 0.15);
  }
  #result.bad {
    background: #2a0d0d;
    border-color: #d04949;
    box-shadow: 0 0 0 3px rgba(208, 73, 73, 0.15);
  }
  #result .verdict {
    font-size: 1.8rem;
    font-weight: 700;
    letter-spacing: 0.02em;
    margin-bottom: 0.5rem;
    line-height: 1.1;
  }
  #result.ok .verdict { color: #7ae3a9; }
  #result.bad .verdict { color: #ff8a8a; }
  #result .name {
    font-size: 1.5rem;
    font-weight: 600;
    letter-spacing: -0.01em;
    margin-top: 0.5rem;
    color: #ffffff;
  }
  #result .value {
    font-family: ui-monospace, "SF Mono", Consolas, monospace;
    font-size: 0.9rem;
    word-break: break-all;
    color: #c2c6cd;
    margin-top: 0.5rem;
  }
  #result .meta {
    font-size: 0.75rem;
    color: #8a8f98;
    margin-top: 0.35rem;
  }

  .stats {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0.75rem;
    margin-bottom: 1.25rem;
  }
  .stat {
    padding: 0.9rem 1rem;
    background: #14171e;
    border: 1px solid #1e222b;
    border-radius: 10px;
    text-align: center;
  }
  .stat .num { font-size: 1.6rem; font-weight: 700; letter-spacing: -0.02em; }
  .stat .lbl { font-size: 0.7rem; color: #8a8f98; text-transform: uppercase; letter-spacing: 0.08em; margin-top: 0.15rem; }
  .stat.ok .num { color: #7ae3a9; }
  .stat.bad .num { color: #ff8a8a; }

  #btn-scan {
    width: 100%;
    padding: 1.1rem;
    font-size: 1.15rem;
    font-weight: 700;
    letter-spacing: 0.08em;
    border: none;
    border-radius: 14px;
    background: linear-gradient(180deg, #3b82f6, #2563eb);
    color: white;
    cursor: pointer;
    box-shadow: 0 6px 24px rgba(59, 130, 246, 0.35);
    transition: transform 0.08s, box-shadow 0.2s;
  }
  #btn-scan:active {
    transform: scale(0.98);
    box-shadow: 0 3px 14px rgba(59, 130, 246, 0.3);
  }

  /* ---------- SCAN VIEW ---------- */
  #view-scan {
    position: fixed;
    inset: 0;
    background: #000;
    z-index: 10;
  }
  #view-scan.active { display: block; }
  #reader {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    background: #000;
  }
  #reader video {
    width: 100% !important;
    height: 100% !important;
    object-fit: cover;
  }
  #reader img[alt="Info icon"],
  #reader > div[style*="text-align: center"]:first-child,
  #reader__dashboard,
  #reader__header_message,
  #reader__status_span,
  #reader__filescan_input {
    display: none !important;
  }

  #btn-back {
    position: absolute;
    top: calc(0.75rem + env(safe-area-inset-top));
    left: calc(0.75rem + env(safe-area-inset-left));
    z-index: 20;
    padding: 0.6rem 1rem;
    background: rgba(20, 23, 30, 0.85);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    color: #e8eaed;
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 999px;
    font-size: 0.95rem;
    font-weight: 500;
    cursor: pointer;
  }
  #btn-back:active { background: rgba(40, 44, 55, 0.9); }

  #scan-overlay {
    position: absolute;
    left: 50%;
    bottom: calc(2rem + env(safe-area-inset-bottom));
    transform: translateX(-50%);
    z-index: 15;
    padding: 1rem 1.5rem;
    border-radius: 14px;
    background: rgba(20, 23, 30, 0.9);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 2px solid rgba(255,255,255,0.1);
    text-align: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s;
    min-width: min(300px, 80vw);
    max-width: 90vw;
  }
  #scan-overlay.show { opacity: 1; }
  #scan-overlay.ok { border-color: #1f9d5f; background: rgba(16, 120, 60, 0.95); }
  #scan-overlay.bad { border-color: #d04949; background: rgba(180, 40, 40, 0.95); }
  #scan-overlay .verdict {
    font-size: 1.3rem;
    font-weight: 700;
    letter-spacing: 0.02em;
    color: #ffffff;
  }
  #scan-overlay .name {
    font-size: 1.15rem;
    font-weight: 600;
    color: #ffffff;
    margin-top: 0.35rem;
  }
  #scan-overlay .sub {
    font-size: 0.8rem;
    color: rgba(255,255,255,0.85);
    margin-top: 0.3rem;
  }

  #view-scan::after {
    content: "";
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: 12;
    background: transparent;
    transition: background 0.25s;
  }
  #view-scan.flash-ok::after { background: rgba(31, 157, 95, 0.45); }
  #view-scan.flash-bad::after { background: rgba(208, 73, 73, 0.5); }
</style>
</head>
<body>
  <div id="view-hub" class="view active">
    <div class="wrap">
      <h1>Scanner</h1>
      <div id="result" class="empty">
        <div class="verdict">Ingen skann ennå</div>
      </div>
      <div class="stats">
        <div class="stat ok"><div class="num" id="stat-ok">0</div><div class="lbl">Godkjent</div></div>
        <div class="stat bad"><div class="num" id="stat-bad">0</div><div class="lbl">Avvist</div></div>
      </div>
      <button id="btn-scan">SKANN</button>
    </div>
  </div>

  <div id="view-scan" class="view">
    <button id="btn-back">← Tilbake</button>
    <div id="reader"></div>
    <div id="scan-overlay"></div>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
